provider:
  backend: searxng
  searxng:
    base_url: https://searxng.lycoreco.dpdns.org/search
    api_key: null
    timeout_s: 20.0
    allow_redirects: false
    headers: {}

http:
  proxy: null
  trust_env: false
  max_connections: 100
  max_keepalive_connections: 20
  keepalive_expiry_s: 5.0

pipeline:
  default_profile: general
  max_results: 16
  min_score: 0.3
  include_raw: false
  profiles:
    general: {}
    music:
      fuzzy_threshold: 0.88
      auto_match:
        enabled: true
        keywords: ["new song", "single", "album", "MV"]
        regex: []
        priority: 10
      intent_terms: ["release", "single", "album", "new song"]
      noise_words: ["privacy", "terms", "cookie"]
      domain_bonus:
        wikipedia.org: 3
        youtube.com: 2
      domain_groups:
        wikipedia: ["wikipedia"]
        youtube: ["youtube"]
      title_tail_patterns:
        - "(?:-?\\s*)?(wikipedia.*)$"

rank:
  backend: blend
  blend:
    providers:
      bm25: 0.7
      heuristic: 0.3
  heuristic:
    early_bonus: 1.15
    unique_hit_weight: 6.0
    count_weight: 1.5
    intent_hit_weight: 5.0
    max_count_per_token: 5
    temperature: 1.0
    min_items_for_sigmoid: 1
    flat_spread_eps: 1e-9
    z_clip: 8.0

enrich:
  enabled: true
  fetch:
    backend: auto # auto|httpx|curl_cffi|playwright
  depth_presets:
    low: {pages_ratio: 0.25, min_pages: 1, max_pages: 3, top_chunks_per_page: 2}
    medium: {pages_ratio: 0.50, min_pages: 2, max_pages: 6, top_chunks_per_page: 3}
    high: {pages_ratio: 0.75, min_pages: 3, max_pages: 10, top_chunks_per_page: 5}

cache:
  enabled: false
  backend: sqlite # sqlite|memory|redis|mysql|sqlalchemy
  search_ttl_s: 600
  fetch_ttl_s: 86400
  sqlite:
    db_path: serpsage_cache.sqlite3
    table: cache
  redis:
    url: redis://127.0.0.1:6379/0
    key_prefix: serpsage
  mysql:
    driver: auto # auto|asyncmy|aiomysql
    host: 127.0.0.1
    port: 3306
    user: root
    password: ""
    database: serpsage
    table: cache
    minsize: 1
    maxsize: 10
    connect_timeout: 10.0
    charset: utf8mb4
  sqlalchemy:
    url: sqlite+aiosqlite:///./.serpsage_cache.sqlite3
    table: cache

overview:
  enabled: true
  use_model: gpt-4.1-mini
  models:
    - name: gpt-4.1-mini
      backend: openai
      base_url: null
      api_key: null
      model: gpt-4.1-mini
      timeout_s: 60.0
      max_retries: 2
      temperature: 0.0
      headers: {}
      schema_strict: true
    - name: gemini-3-flash
      backend: gemini
      base_url: null
      api_key: null
      model: gemini-3-flash-preview
      timeout_s: 60.0
      max_retries: 2
      temperature: 0.0
      headers: {}
      schema_strict: true
  max_sources: 8
  max_chunks_per_source: 2
  max_chunk_chars: 900
  max_output_tokens: 600
  max_prompt_chars: 32000
  cache_ttl_s: 0
  self_heal_retries: 1
  force_language: auto

telemetry:
  enabled: true
  include_events: false
