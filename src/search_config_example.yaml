provider:
  backend: searxng
  searxng:
    base_url: https://searxng.lycoreco.dpdns.org/search
    api_key: null
    timeout_s: 20.0
    allow_redirects: false
    headers: {}

http:
  proxy: http://127.0.0.1:7890
  trust_env: false
  max_connections: 100
  max_keepalive_connections: 20
  keepalive_expiry_s: 5.0

search:
  max_results: 16
  additional_query_score_weight: 0.8

answer:
  plan:
    use_model: kimi-k2-turbo-preview
  generate:
    use_model: kimi-k2-turbo-preview
    max_abstract_chars: 2000

runner:
  search_limit: 8
  fetch_limit: 24
  child_fetch_limit: 24
  queue_size: 256

fetch:
  backend: auto # auto|curl_cffi|playwright
  timeout_s: 20
  follow_redirects: true
  user_agent: serpsage-bot/4.0
  concurrency:
    global_limit: 24
    per_host: 4
    politeness_delay_ms: 0
  render:
    js_concurrency: 4
    nav_timeout_ms: 25000
    wait_network_idle_ms: 220
    block_resources: true
  quality:
    min_text_chars: 220
    script_ratio_threshold: 0.35
    blocked_markers:
      - cloudflare
      - just a moment
      - verify you are human
      - access denied
      - please enable javascript
      - security check
      - checking your browser
  extract:
    max_markdown_chars: 160000
    min_text_chars: 220
    min_primary_chars: 220
    min_total_chars_with_secondary: 220
    include_secondary_content_default: false
    collect_links_default: false
    link_max_count: 800
    link_keep_hash: false
  abstract:
    max_abstract_chars: 2000
    min_abstract_score: 0.4
    min_abstract_tokens: 4
    title_boost_alpha: 0.35
  overview:
    use_model: gpt-4.1-mini
    max_abstract_chars: 900
    cache_ttl_s: 0
    self_heal_retries: 1
    force_language: auto

rank:
  backend: blend
  blend:
    providers:
      bm25: 0.7
      heuristic: 0.3
  heuristic:
    early_bonus: 1.15
    unique_hit_weight: 6.0
    count_weight: 1.5
    intent_hit_weight: 5.0
    max_count_per_token: 5
    temperature: 1.0
    min_items_for_sigmoid: 1
    flat_spread_eps: 1e-9
    z_clip: 8.0

llm:
  models:
    - name: gpt-4.1-mini
      backend: openai
      base_url: https://api.chatanywhere.tech/v1
      api_key: null
      model: gpt-4.1-mini
      timeout_s: 60.0
      max_retries: 2
      temperature: 0.0
      headers: {}
      schema_strict: true
    - name: gemini-3-flash
      backend: gemini
      base_url: null
      api_key: null
      model: gemini-3-flash-preview
      timeout_s: 60.0
      max_retries: 2
      temperature: 0.0
      headers: {}
      schema_strict: true
    - name: kimi-k2-turbo-preview
      backend: openai
      base_url: https://api.moonshot.cn/v1
      api_key: sk-FomXjBE7WWcub7wMCh3rTfPcu3OCsvf7g8TVMCFJLKzLvnNC
      model: kimi-k2-turbo-preview
      timeout_s: 60.0
      max_retries: 2
      temperature: 0.0
      headers: {}
      schema_strict: true

cache:
  enabled: false
  backend: sqlite # sqlite|memory|redis|mysql|sqlalchemy
  fetch_ttl_s: 86400
  sqlite:
    db_path: serpsage_cache.sqlite3
    table: cache
  redis:
    url: redis://127.0.0.1:6379/0
    key_prefix: serpsage
  mysql:
    driver: auto # auto|asyncmy|aiomysql
    host: 127.0.0.1
    port: 3306
    user: root
    password: ""
    database: serpsage
    table: cache
    minsize: 1
    maxsize: 10
    connect_timeout: 10.0
    charset: utf8mb4
  sqlalchemy:
    url: sqlite+aiosqlite:///./.serpsage_cache.sqlite3
    table: cache

telemetry:
  enabled: true
  include_events: false
