provider:
  backend: searxng
  searxng:
    base_url: https://searxng.lycoreco.dpdns.org/search
    # Prefer env override: SEARCH_API_KEY
    api_key: null
    timeout_s: 20.0
    allow_redirects: false
    headers: {}

pipeline:
  default_profile: general
  max_results: 16
  min_score: 0.5
  include_raw: false
  profiles:
    general: {}

    music:
      fuzzy_threshold: 0.88
      auto_match:
        enabled: true
        keywords: ["新曲", "新歌", "MV", "single", "album"]
        regex: []
        priority: 10
      intent_terms:
        [
          "新曲",
          "新歌",
          "发布",
          "上线",
          "单曲",
          "专辑",
          "release",
          "new song",
          "single",
          "album",
        ]
      noise_words: ["dict.txt", "privacy", "terms", "cookie"]
      domain_bonus:
        wikipedia.org: 3
        youtube.com: 2
      domain_groups:
        wikipedia: ["wikipedia"]
        youtube: ["youtube"]
      title_tail_patterns:
        - "(?:-?\\s*)?(wikipedia.*)$"

rank:
  backend: blend # blend|heuristic|bm25
  blend:
    providers:
      bm25: 0.7
      heuristic: 0.3
  normalization:
    min_items_for_sigmoid: 1
    single_item_method: sigmoid_log1p
    single_item_scale: 1.0

enrich:
  enabled: true
  extractor:
    backend: main_content # basic|main_content
    basic: {}
    main_content: {}
  fetch:
    backend: auto # httpx|curl_cffi|auto
    common:
      user_agent: serpsage-bot/3.0
      timeout_s: 10.0
      max_bytes: 2000000
      max_extracted_chars: 50000
      allow_content_types: [text/html, application/xhtml+xml, text/plain]
      follow_redirects: true
      max_redirects: 10
      retry:
        max_attempts: 3
        base_delay_ms: 200
        max_delay_ms: 2000
      global_concurrency: 16
      per_host_concurrency: 2
      politeness_delay_ms: 0

      accept_language: zh-CN,zh;q=0.9,en;q=0.8
      use_browser_headers: true
      disable_br: true
      extra_headers: {}
      proxy: null
      cookies: {}

      max_bytes_behavior: truncate
      sniff_html_bytes: 16384
      min_html_bytes: 512
      cache_blocked_pages: false

      validate_extractable: true
      min_blocks: 3
      min_text_chars: 400
      validate_max_chars: 200000
    httpx: {}
    curl_cffi:
      impersonate: chrome120
      http2: true
      verify_ssl: true
    auto:
      total_budget_s: 3.0
      max_attempts_total: 4
      max_attempts_per_strategy: 3
  select:
    min_chunk_score: 0.20
    score_soft_gate_tau: 0.07
    template_penalty_weight: 2.0
  depth_presets:
    low: {pages_ratio: 0.25, min_pages: 1, max_pages: 3, top_chunks_per_page: 2}
    medium: {pages_ratio: 0.50, min_pages: 2, max_pages: 6, top_chunks_per_page: 3}
    high: {pages_ratio: 0.75, min_pages: 3, max_pages: 10, top_chunks_per_page: 5}

cache:
  enabled: false
  backend: sqlite # sqlite|memory|redis|mysql|sqlalchemy
  search_ttl_s: 600
  fetch_ttl_s: 86400
  sqlite:
    db_path: serpsage_cache.sqlite3
    table: cache
  redis:
    url: redis://127.0.0.1:6379/0
    key_prefix: serpsage
  mysql:
    driver: auto # auto|asyncmy|aiomysql
    host: 127.0.0.1
    port: 3306
    user: root
    password: ""
    database: serpsage
    table: cache
    minsize: 1
    maxsize: 10
    connect_timeout: 10.0
    charset: utf8mb4
  sqlalchemy:
    url: sqlite+aiosqlite:///./.serpsage_cache.sqlite3
    table: cache

overview:
  enabled: true
  backend: openai # openai|null
  openai:
    llm:
      base_url: https://api.openai.com/v1
      api_key: null
      model: gpt-4.1-mini
      timeout_s: 60.0
      max_retries: 2
      temperature: 0.0
      headers: {}
    schema_strict: true
  null: {}
  max_sources: 8
  max_chunks_per_source: 2
  max_chunk_chars: 900
  max_output_tokens: 600
  max_prompt_chars: 32000
  cache_ttl_s: 0
  self_heal_retries: 1
  force_language: auto

telemetry:
  enabled: false
  include_events: false
