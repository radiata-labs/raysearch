provider:
  backend: searxng
  searxng:
    base_url: https://searxng.lycoreco.dpdns.org/search
    # Prefer env override: SEARCH_API_KEY
    api_key: sk-63133540a039c3443e874d71928b0d0d777a39f0
    timeout_s: 20.0
    allow_redirects: false
    headers: {}

http:
  proxy: null
  trust_env: false
  max_connections: 100
  max_keepalive_connections: 20
  keepalive_expiry_s: 5.0

pipeline:
  default_profile: general
  max_results: 16
  min_score: 0.5
  include_raw: false
  profiles:
    general: {}

    music:
      fuzzy_threshold: 0.88
      auto_match:
        enabled: true
        keywords: ["新曲", "新歌", "MV", "single", "album"]
        regex: []
        priority: 10
      intent_terms:
        [
          "新曲",
          "新歌",
          "发布",
          "上线",
          "单曲",
          "专辑",
          "release",
          "new song",
          "single",
          "album",
        ]
      noise_words: ["dict.txt", "privacy", "terms", "cookie"]
      domain_bonus:
        wikipedia.org: 3
        youtube.com: 2
      domain_groups:
        wikipedia: ["wikipedia"]
        youtube: ["youtube"]
      title_tail_patterns:
        - "(?:-?\\s*)?(wikipedia.*)$"

rank:
  backend: blend # blend|heuristic|bm25
  blend:
    providers:
      bm25: 0.7
      heuristic: 0.3
  normalization:
    min_items_for_sigmoid: 1
    single_item_method: sigmoid_log1p
    single_item_scale: 1.0

enrich:
  enabled: true
  extractor:
    backend: main_content # basic|main_content
    basic: {}
    main_content: {}
  fetch:
    backend: curl_cffi # httpx|curl_cffi|auto
    user_agent: serpsage-bot/3.0
    timeout_s: 10.0
    follow_redirects: true
    extra_headers: {}
    cookies: {}
    rate_limit:
      global_concurrency: 16
      per_host_concurrency: 16
      politeness_delay_ms: 0
    httpx:
      retry:
        max_attempts: 1
        delay_ms: 200
    curl_cffi:
      impersonate: chrome120
      http2: true
      verify_ssl: true
      retry:
        max_attempts: 1
        delay_ms: 200
    auto: {}
  select:
    min_chunk_score: 0.20
    score_soft_gate_tau: 0.07
    template_penalty_weight: 2.0
  depth_presets:
    low: {pages_ratio: 0.25, min_pages: 1, max_pages: 3, top_chunks_per_page: 2}
    medium: {pages_ratio: 0.50, min_pages: 2, max_pages: 6, top_chunks_per_page: 3}
    high: {pages_ratio: 0.75, min_pages: 3, max_pages: 10, top_chunks_per_page: 5}

cache:
  enabled: false
  backend: sqlite # sqlite|memory|redis|mysql|sqlalchemy
  search_ttl_s: 600
  fetch_ttl_s: 86400
  sqlite:
    db_path: serpsage_cache.sqlite3
    table: cache
  redis:
    url: redis://127.0.0.1:6379/0
    key_prefix: serpsage
  mysql:
    driver: auto # auto|asyncmy|aiomysql
    host: 127.0.0.1
    port: 3306
    user: root
    password: ""
    database: serpsage
    table: cache
    minsize: 1
    maxsize: 10
    connect_timeout: 10.0
    charset: utf8mb4
  sqlalchemy:
    url: sqlite+aiosqlite:///./.serpsage_cache.sqlite3
    table: cache

overview:
  enabled: false
  backend: openai # openai|null
  openai:
    llm:
      base_url: https://api.openai.com/v1
      api_key: null
      model: gpt-4.1-mini
      timeout_s: 60.0
      max_retries: 2
      temperature: 0.0
      headers: {}
    schema_strict: true
  null: {}
  max_sources: 8
  max_chunks_per_source: 2
  max_chunk_chars: 900
  max_output_tokens: 600
  max_prompt_chars: 32000
  cache_ttl_s: 0
  self_heal_retries: 1
  force_language: auto

telemetry:
  enabled: true
  include_events: false
