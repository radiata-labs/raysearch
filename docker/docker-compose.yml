# =============================================================================
# RaySearch API - Docker Compose
# =============================================================================
# Usage:
#   Production: docker compose up -d
#   Development: docker compose -f docker-compose.yml -f docker-compose.override.yml up
# =============================================================================

services:
  raysearch-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: prod                   # Production by default
    container_name: raysearch-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RAYSEARCH_CONFIG_PATH: /app/config/raysearch.yaml
      RAYSEARCH_API_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:${RAYSEARCH_HOST_PORT:-8000}:8000"
    volumes:
      - "./${RAYSEARCH_CONFIG_FILE:-raysearch.example.yaml}:/app/config/raysearch.yaml:ro"
      - "./data:/app/.cache"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - raysearch-net

networks:
  raysearch-net:
    driver: bridge