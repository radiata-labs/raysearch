searxng:
  base_url: https://searxng.lycoreco.dpdns.org/search
  search_api_key: "sk-63133540a039c3443e874d71928b0d0d777a39f0"

default_profile: general

# Global scoring (single source of truth).
scoring:
  providers:
    bm25: 0.7
    heuristic: 0.3
  normalization:
    # Per-candidate-set, not cross-query comparable.
    min_items_for_sigmoid: 1

# Global min-score filter (applies to results and web chunks).
score_filter:
  min_score: 0.5

profiles:
  general: {}

  music:
    auto_match:
      enabled: true
      keywords: [新曲, 新歌, アルバム, MV, single, album]
      priority: 10

    intent_terms:
      - 新曲
      - 新歌
      - 发布
      - 公布
      - 上线
      - 上架
      - 单曲
      - 首发
      - 专辑
      - アルバム
      - シングル
      - 配信
      - MV
      - ミュージックビデオ
      - release
      - new song
      - single
      - album
      - "2024"
      - "2025"

    noise_words:
      - base_dic_full.txt
      - main.dic.txt
      - dict.txt
      - 技术参数表
      - 招标
      - 采购
      - 公告
      - downfile.aspx
      - tibettravel
      - aliyun-doc
      - paddlenlp
      - oss-cn-

    domain_bonus:
      kaf.kamitsubaki.jp: 10
      kamitsubaki.jp: 8
      prtimes.jp: 7
      natalie.mu: 6
      ototoy.jp: 6
      zh.wikipedia.org: 4
      ja.wikipedia.org: 4
      wikipedia.org: 3
      youtube.com: 2
      open.spotify.com: 1
      music.apple.com: 1
      x.com: 1

    domain_groups:
      moegirl: [moegirl]
      wikipedia: [wikipedia]
      kamitsubaki: [kamitsubaki]
      bilibili: [bilibili]
      nicovideo: [nicovideo]
      youtube: [youtube]
      streaming: [spotify, music.apple.com]

    title_tail_patterns:
      - "(?:-?\\s*)?(萌娘百科.*|万物皆可萌.*)$"
