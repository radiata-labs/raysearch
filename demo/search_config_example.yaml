components:
  http:
    default: httpx
    httpx:
      enabled: true
      proxy: http://127.0.0.1:7890
      trust_env: true
      max_connections: 100
      max_keepalive_connections: 50
      keepalive_expiry_s: 20.0

  provider:
    default: blend
    blend:
      enabled: true
      default_sources: ["google", "duckduckgo"]
      include_sources: ["arxiv", "duckduckgo", "github", "google", "google_news", "openalex", "reddit", "reuters", "semantic_scholar", "wikidata", "wikipedia"]
    github:
      enabled: true
      base_url: https://api.github.com/search/repositories
      sort: stars
      order: desc
      results_per_page: 10
    google_news:
      enabled: true
      base_url: https://news.google.com/search
    openalex:
      enabled: true
      base_url: https://api.openalex.org/works
      user_agent: serpsage-openalex-provider/1.0
      results_per_page: 10
      mailto: ""
    marginalia:
      enabled: false
      base_url: https://api2.marginalia-search.com
      user_agent: serpsage-marginalia-provider/1.0
      api_key: null
      results_per_page: 20
    reddit:
      enabled: true
      base_url: https://www.reddit.com/search.json
      allow_redirects: true
      user_agent: serpsage-reddit-provider/1.0
      results_per_page: 25
    reuters:
      enabled: true
      base_url: https://www.reuters.com
      user_agent: serpsage-reuters-provider/1.0
      results_per_page: 20
      sort_order: relevance
    semantic_scholar:
      enabled: true
      base_url: https://www.semanticscholar.org/api/1/search
      site_base_url: https://www.semanticscholar.org
      user_agent: serpsage-semantic-scholar-provider/1.0
      results_per_page: 10
    wikidata:
      enabled: true
      base_url: https://query.wikidata.org/sparql
      user_agent: serpsage-wikidata-provider/1.0
      results_per_page: 5
    wikipedia:
      enabled: true
      base_url: https://{wiki_netloc}/w/rest.php/v1/search/title
      summary_url_template: https://{wiki_netloc}/api/rest_v1/page/summary/{title}
      page_url_template: https://{wiki_netloc}/wiki/{title}
      user_agent: serpsage-wikipedia-provider/1.0 (https://example.com)
      allow_redirects: true
      default_language: en
      results_per_page: 5
    google:
      enabled: true
      cookies:
        CONSENT: "YES+"
    searxng:
      enabled: true
      base_url: https://searxng.lycoreco.dpdns.org/search
      allow_redirects: false
    duckduckgo:
      enabled: true
      base_url: https://html.duckduckgo.com/html
      allow_redirects: false
    arxiv:
      enabled: true

  crawl:
    default: auto
    auto:
      enabled: true
      timeout_s: 10.0
      inflight_enabled: true
      inflight_timeout_s: 60.0
      scout_bytes: 48000
      min_text_chars: 100
      max_script_ratio: 0.35
      min_useful_score: 0.15
      playwright_rules: []
    curl_cffi:
      enabled: true
      timeout_s: 10.0
      follow_redirects: true
      user_agent: serpsage-bot/4.0
    playwright:
      enabled: true
      timeout_s: 20.0
      user_agent: serpsage-bot/4.0
      js_concurrency: 12
      nav_timeout_ms: 8000
      block_resources: true
      readiness_poll_ms: 150
      readiness_stable_rounds: 2
      post_ready_wait_ms: 120
      ready_text_chars: 100
    reddit:
      enabled: true
    doi:
      enabled: true

  extract:
    default: auto
    auto:
      enabled: true
    html:
      enabled: true
    pdf:
      enabled: true
    paper:
      enabled: true
    github:
      enabled: true
    reddit:
      enabled: true
    doi:
      enabled: true

  rank:
    default: blend
    blend:
      enabled: true
      providers:
        bm25: 0.5
        tfidf: 0.5
      rerank:
        retrieve_weight: 0.35
        cross_encoder_weight: 0.65
    tfidf:
      enabled: true
    bm25:
      enabled: true
    cross_encoder:
      enabled: false
      model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
      batch_size: 16
      max_length: 512

  cache:
    default: memory
    memory:
      enabled: true
    sqlite:
      enabled: false
      fetch_ttl_s: 86400
      db_path: ./.cache/serpsage_cache.sqlite3
      table: cache

  llm:
    default: router
    router:
      enabled: true
    openai:
      enabled: true
      models:
        - name: gpt-4.1-mini
          base_url: https://api.chatanywhere.tech/v1
          api_key: null
          model: gpt-4.1-mini
          timeout_s: 60.0
          max_retries: 2
          temperature: 0.0
          headers: {}
          enable_structured: true
        - name: kimi-k2.5
          base_url: https://coding.dashscope.aliyuncs.com/v1
          api_key: sk-sp-896f874fbb1e432f84733214e0c38297
          model: kimi-k2.5
          timeout_s: 60.0
          max_retries: 0
          temperature: 0.0
          headers: {}
          enable_structured: true
    gemini:
      enabled: true
      models:
        - name: gemini-3-flash
          base_url: null
          api_key: null
          model: gemini-3-flash-preview
          timeout_s: 60.0
          max_retries: 2
          temperature: 0.0
          headers: {}
          enable_structured: true

  tracking:
    default: log
    jsonl:
      enabled: true
      jsonl_path: ./.cache/.serpsage_tracking.jsonl
    log:
      enabled: true

  metering:
    default: jsonl
    jsonl:
      enabled: true
      jsonl_path: ./.cache/.serpsage_metering.jsonl
    sqlite:
      enabled: false
      sqlite_db_path: ./.cache/.serpsage_metering.sqlite3

  rate_limit:
    default: basic
    basic:
      enabled: true

telemetry:
  tracking:
    minimum_level: INFO
search:
  max_results: 16
  select_engines: true
  expansion:
    llm_model: gpt-4.1-mini
    llm_timeout_s: 20.0
  modes:
    fast:
      max_extra_queries: 0
      prefetch_multiplier: 1.5
      prefetch_max_urls: 16
      context_docs_limit: 0
      context_doc_min_chars: 0
      rank_by_context: false
    auto:
      max_extra_queries: 1
      prefetch_multiplier: 2.25
      prefetch_max_urls: 32
      context_docs_limit: 0
      context_doc_min_chars: 0
      rank_by_context: false
    deep:
      max_extra_queries: 6
      prefetch_multiplier: 3.0
      prefetch_max_urls: 48
      context_docs_limit: 18
      context_doc_min_chars: 16
      rank_by_context: true

fetch:
  extract:
    max_markdown_chars: 160000
    min_text_chars: 220
    min_primary_chars: 220
    min_total_chars_with_secondary: 220
    include_secondary_content_default: false
    collect_links_default: false
    link_max_count: 800
    link_keep_hash: false
  abstract:
    max_abstract_chars: 2000
    min_abstract_score: 0.2
    min_abstract_tokens: 4
    title_boost_alpha: 0.35
  overview:
    use_model: gpt-4.1-mini
    max_abstract_chars: 2000
    cache_ttl_s: 0
    self_heal_retries: 1
    force_language: auto

answer:
  select_engines: true
  plan:
    use_model: gpt-4.1-mini
  generate:
    use_model: gpt-4.1-mini
    max_abstract_chars: 3000

research:
  tool_max_attempts: 3
  llm_self_heal_retries: 2
  select_engines: true
  models:
    plan: kimi-k2.5
    link_select: kimi-k2.5
    abstract_analyze: kimi-k2.5
    content_analyze: kimi-k2.5
    synthesize: kimi-k2.5
    markdown: kimi-k2.5
  research_fast:
    max_rounds: 3
    max_search_calls: 6
    max_fetch_calls: 48
    max_results_per_search: 5
    max_queries_per_round: 3
    max_question_cards_effective: 4
    min_rounds_per_track: 1
    round_search_budget: 2
    round_fetch_budget: 4
    review_source_window: 24
    report_source_batch_size: 4
    report_source_batch_chars: 24000
    fetch_page_max_chars: 24000
    explore_target_pages_per_round: 2
    explore_links_per_page: 4
  research:
    max_rounds: 5
    max_search_calls: 12
    max_fetch_calls: 72
    max_results_per_search: 8
    max_queries_per_round: 5
    max_question_cards_effective: 6
    min_rounds_per_track: 2
    round_search_budget: 3
    round_fetch_budget: 8
    review_source_window: 48
    report_source_batch_size: 8
    report_source_batch_chars: 48000
    fetch_page_max_chars: 48000
    explore_target_pages_per_round: 4
    explore_links_per_page: 10
  research_pro:
    max_rounds: 8
    max_search_calls: 24
    max_fetch_calls: 120
    max_results_per_search: 10
    max_queries_per_round: 6
    max_question_cards_effective: 8
    min_rounds_per_track: 3
    round_search_budget: 4
    round_fetch_budget: 12
    review_source_window: 72
    report_source_batch_size: 12
    report_source_batch_chars: 72000
    fetch_page_max_chars: 72000
    explore_target_pages_per_round: 6
    explore_links_per_page: 16

runner:
  search_limit: 24
  fetch_limit: 48
  child_fetch_limit: 48
  queue_size: 256
